<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก MOTOFOX</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; min-height: 100vh; }
.container { max-width: 400px; margin: 0 auto; padding: 20px; }
.logo { text-align: center; padding: 30px 0 20px; }
.logo h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
.logo p { color: #666; font-size: 14px; margin-top: 4px; }
.card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.card h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.field input { width: 100%; height: 48px; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 0 14px; font-size: 15px; font-family: 'Sarabun', sans-serif; transition: border-color 0.2s; }
.field input:focus { outline: none; border-color: #1a1a2e; }
.field input[readonly] { background: #f9f9f9; color: #999; }
.btn { width: 100%; height: 50px; background: #1a1a2e; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; margin-top: 8px; }
.btn:active { opacity: 0.9; }
.success { text-align: center; padding: 30px 20px; }
.success .icon { font-size: 60px; margin-bottom: 16px; }
.success h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
.success .member-id { background: #f0f9f0; border: 1.5px solid #00b900; border-radius: 10px; padding: 12px; margin: 16px 0; font-size: 18px; font-weight: 700; color: #005500; }
.success p { color: #666; font-size: 14px; }
.loading { text-align: center; padding: 60px 20px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🦊 MOTOFOX</h1>
    <p>ศูนย์บริการมอเตอร์ไซค์</p>
  </div>

  <div id="loading" class="loading">กำลังโหลด...</div>

  <div id="form-section" class="card" style="display:none;">
    <h2>สมัครสมาชิก</h2>
    <div class="field">
      <label>ชื่อใน LINE</label>
      <input type="text" id="display-name" readonly>
    </div>
    <div class="field">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="full-name" placeholder="กรอกชื่อจริง">
    </div>
    <div class="field">
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="08X-XXX-XXXX">
    </div>
    <button class="btn" onclick="register()">สมัครสมาชิก</button>
  </div>

  <div id="success-section" class="card success" style="display:none;">
    <div class="icon">🎉</div>
    <h2>สมัครสมาชิกสำเร็จ!</h2>
    <div class="member-id" id="member-id-display"></div>
    <p>กรุณาบันทึกเลขสมาชิกนี้ไว้<br>หรือแจ้งเจ้าหน้าที่เมื่อเข้ารับบริการ</p>
  </div>
</div>

<script>
const LIFF_ID = '2009830082-YFUF5KC0';
const SCRIPT_URL = 'https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbx92LrTKXQ4Si4f8dVDJ5_h5nVaDeoSc1noBMC_7W7ETdJQFmrUTXp3Ms1_PXpgEdyv/exec/exec';
let lineProfile = null;

async function init() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  lineProfile = await liff.getProfile();
  document.getElementById('display-name').value = lineProfile.displayName;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
}

async function register() {
  const fullName = document.getElementById('full-name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  if (!fullName || !phone) { alert('กรุณากรอกข้อมูลให้ครบ'); return; }

  const memberId = 'MSP-' + String(Date.now()).slice(-5);
  const data = {
    action: 'register',
    member_id: memberId,
    line_uid: lineProfile.userId,
    display_name: lineProfile.displayName,
    full_name: fullName,
    phone: phone
  };

  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('member-id-display').textContent = 'เลขสมาชิก: ' + memberId;
    document.getElementById('success-section').style.display = 'block';
  } catch(e) {
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
  }
}

init();
</script>
</body>
</html>
